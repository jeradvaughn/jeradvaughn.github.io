<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Jerad</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        button {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            background-color: #000000;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* The Full-Screen Overlay */
        #boomModal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* The Flashing Background Animation */
            animation: flashBg 0.5s infinite;
        }

        /* The Growing & Flashing Text */
        .boomer-text {
            font-size: 15vw;
            font-family: 'Impact', sans-serif;
            font-weight: 900;
            text-align: center;
            line-height: 0.9;
            /* Apply Grow and Color Flash animations */
            animation: grow 0.5s ease-out forwards, flashText 0.1s infinite;
        }

        /* ANIMATIONS */

        /* 1. Makes the text explode outward */
        @keyframes grow {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* 2. Flashes the background between white and crimson */
        @keyframes flashBg {
            0%, 100% { background-color: white; }
            50% { background-color: #841617; }
        }

        /* 3. Flashes the text color to contrast the background */
        @keyframes flashText {
            0%, 100% { color: #841617; }
            50% { color: white; }
        }

        .close-btn {
            position: absolute;
            bottom: 50px;
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <h1>Hello World from Jerad</h1>
    <button onclick="showBoomer()">Click for Test</button>

    <div id="boomModal">
        <div class="boomer-text">BOOMER<br>SOONER</div>
        <button class="close-btn" onclick="hideBoomer()">STOP THE MADNESS</button>
    </div>

    <script>
        function showBoomer() {
            document.getElementById('boomModal').style.display = 'flex';
        }

        function hideBoomer() {
            document.getElementById('boomModal').style.display = 'none';
        }
    </script>

</body>
</html>
